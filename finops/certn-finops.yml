principles:
- name: Visibility
  description: Track check volume and cost by check type, team, and country; each check type has a distinct unit price.
- name: Allocation
  description: Scope applications to teams/owners so per-check spend maps to internal cost centers and hiring/leasing workflows.
- name: Optimization
  description: Order only the checks a role or jurisdiction requires; use bundled CertnCentric tiers or enterprise volume pricing when check volume is high; avoid re-running checks by upgrading existing applications.
- name: Accountability
  description: Assign owners per team; review monthly per-check spend against the published unit prices and any negotiated bundle rates.
