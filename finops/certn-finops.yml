description: >-
  FinOps view of Certn spend. Certn is a pay-per-check platform: API access is
  free and cost is driven entirely by the checks you order. Each check type has
  its own unit price (criminal, identity/OneID, credit, public records,
  employment/education/credential verification, reference, driver's abstract,
  social media, and international variants), and bundled CertnCentric tiers or
  enterprise agreements offer negotiated rates at volume. Cost management is
  therefore about controlling the mix and volume of checks ordered per applicant
  and per team.
notes: >-
  Per-check rates are published self-serve in CAD and vary by check type and
  jurisdiction; international checks are quoted per country. Enterprise pricing is
  bundled and negotiated. Verify current unit prices on certn.co/pricing during
  reconciliation.
