specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Certn
providerId: certn
created: '2026-07-03'
modified: '2026-07-03'
reconciled: false
tags:
- Background Checks
- Identity Verification
- Screening
- Plans
- Pricing
description: >-
  Certn does not charge for API access itself - access is free and you pay only
  for the checks you run (pay-per-check). Self-serve per-check list prices are
  published in CAD on the Certn pricing page; volume, bundled CertnCentric tiers
  (Essential, Pro, Elite), and enterprise pricing are quoted by sales. The
  entries below capture the published self-serve per-check prices as of the
  review date; verify current rates and currency at certn.co/pricing before
  relying on them.
notes: >-
  Prices are self-serve list prices in CAD and change over time; enterprise and
  high-volume customers receive custom bundled pricing. Some checks (e.g.
  international criminal record checks across 200+ countries) are quoted per
  country/jurisdiction and are not flat-rate.
sources:
- https://certn.co/pricing/
- https://certn.co/background-screening-api/
- https://docs.certn.co/api
plans:
- id: certn-api-access
  name: API Access (Pay Per Check)
  type: free
  description: >-
    Free access to the Certn REST API - there is no platform or subscription fee
    to integrate. You are billed only for the individual checks you order.
    Authentication is OAuth 2.0 client credentials.
  entries:
  - label: API Access
    name: api_access
    type: flat
    metric: access
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: free (pay only for checks used)
    userMultiplied: false
  elements:
  - name: OAuth 2.0 Client Credentials
  - name: Webhooks
  - name: Demo Environment
- id: certn-per-check
  name: Per-Check (Self-Serve, CAD)
