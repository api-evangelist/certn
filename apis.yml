- aid: certn:certn-webhooks-api
  name: Certn Webhooks API
  tags:
  - Webhooks
  - Events
  - Notifications
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.certn.co/api/guides/use-the-api/webhooks
  baseURL: https://api.certn.co/api/v1
  properties:
  - url: https://docs.certn.co/api/guides/use-the-api/webhooks
    type: Documentation
  - url: openapi/certn-openapi.yml
    type: OpenAPI
  - url: collections/certn.postman_collection.json
    type: PostmanCollection
  - url: collections/certn.opencollection.json
    type: OpenCollection
  description: Receive server-to-server POST callbacks as screening results become
    available. Certn signs each payload with a Certn-Signature header (HMAC-SHA256
    with a timestamp and v1 signature) and retries on 408/500/502/503/504.
    Webhook endpoints are registered in the Partner dashboard, not via a public
    REST endpoint.
