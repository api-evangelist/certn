    type: OpenAPI
  - url: collections/certn.postman_collection.json
    type: PostmanCollection
  - url: collections/certn.opencollection.json
    type: OpenCollection
  description: Request and retrieve individual check types attached to an
    application - criminal record checks (Basic and Enhanced Canadian, US,
    international across 200+ countries), identity/OneID verification, credit
    reports, public records, employment, education, credential, professional
    reference, driver's abstract, working-with-children, and social media checks.
