aid: certn
url: https://raw.githubusercontent.com/api-evangelist/certn/refs/heads/main/apis.yml
name: Certn
kind: company
description: Certn is a Canada-based, globally operating background check and identity
  verification platform. Its RESTful API lets HR, property management, gig, and
  marketplace platforms order and retrieve criminal record checks, identity
  verification, credit, employment, education, credential, and reference checks
  across 200+ countries, then receive results and adjudicated reports. The API
  authenticates with OAuth 2.0 client credentials (Client ID / Client Secret
  exchanged for a Bearer token) and pushes status updates via signed webhooks. The
  original api.certn.co v1 REST API is deprecated (discontinued 2026-08-05) in
  favor of the newer CertnCentric APIs; both are modeled here honestly.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Background Checks
- Identity Verification
- Criminal Record Check
- Screening
- HR Tech
- Compliance
- Trust and Safety
created: '2026-07-03'
modified: '2026-07-03'
